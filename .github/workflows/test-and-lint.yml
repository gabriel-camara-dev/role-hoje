name: Lint and Build

on:
  workflow_dispatch:
  push:
    branches: ['dev']
  pull_request:
    branches: ['**']

env:
  # Required for type generation:
  DUMMY_DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"


jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [22.x, 24.x]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      
      - name: Enable Corepack
        run: corepack enable

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        run: |
          pnpm run ci:lint
          echo "✅ Lint passed" >> $GITHUB_STEP_SUMMARY

      # Typecheck covers test/ and *.spec.ts, which tsconfig.build.json excludes —
      # without this step a broken spec only shows up locally.
      - name: Typecheck
        env:
          DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
        run: |
          pnpm run ci:generate
          pnpm run typecheck
          echo "✅ Typecheck passed" >> $GITHUB_STEP_SUMMARY

      # Unit tests only: the e2e suite needs Postgres + Redis services.
      - name: Unit tests
        env:
          DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
        run: |
          pnpm run test
          echo "✅ Tests passed" >> $GITHUB_STEP_SUMMARY

      - name: Build
        env:
          DATABASE_URL: ${{ env.DUMMY_DATABASE_URL }}
        run: |
          pnpm run ci:build
          echo "✅ Build succeeded" >> $GITHUB_STEP_SUMMARY

      - name: Final Summary
        if: always()
        run: |
          echo "## 🧾 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "Node.js v${{ matrix.node }}" >> $GITHUB_STEP_SUMMARY
          echo "🕒 Completed at $(date)" >> $GITHUB_STEP_SUMMARY

          # Checks the overall job status to add a success/failure icon at the top
          if [ "${{ job.status }}" == "success" ]; then
            echo "Status: 🟢 Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "Status: 🔴 Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -d dist ]; then ls -lh dist/ | tail -n +2 >> $GITHUB_STEP_SUMMARY; else echo "No dist/ folder found (Build failed or created empty dist)" >> $GITHUB_STEP_SUMMARY; fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY